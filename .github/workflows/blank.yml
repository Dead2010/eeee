name: Deploy to Sri Lanka Server

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Your Sri Lanka VPS IP'
        required: true
        default: '123.456.78.90'  # Replace with your paid VPS IP

jobs:
  connect-to-sri-lanka-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Connect to Sri Lanka VPS and install tmate
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ github.event.inputs.server_ip }}
        username: ubuntu
        key: ${{ secrets.SRI_LANKA_SSH_KEY }}
        script: |
          echo "Connected to Sri Lanka Server!"
          echo "Location: Colombo, Sri Lanka"
          
          # Update system
          sudo apt-get update
          
          # Install tmate
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:tmate.io/archive
          sudo apt-get update
          sudo apt-get install -y tmate
          
          # Start tmate session
          tmate -S /tmp/tmate.sock new-session -d
          sleep 5
          
          # Get connection info
          echo "==================================="
          echo "✅ SRI LANKA SERVER READY!"
          echo "==================================="
          echo "SSH Connection: $(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')"
          echo "Web Connection: $(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')"
          echo "==================================="
          echo "Server Location: Colombo, Sri Lanka"
          echo "Local Time: $(date)"
          echo "==================================="
          
          # Keep session alive
          tmate -S /tmp/tmate.sock wait-for tmate-ready