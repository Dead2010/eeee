name: Sri Lanka VPS with Tmate

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Region'
        required: true
        default: 'mumbai'
        type: choice
        options:
          - mumbai (40ms to Sri Lanka)
          - singapore (50ms to Sri Lanka)

jobs:
  setup-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create VPS Environment
      run: |
        echo "========================================="
        echo "🇱🇰 SRI LANKA VPS SETUP"
        echo "========================================="
        echo "Creating virtual environment..."
        
        # Create a simulated VPS environment
        mkdir -p ~/sri-lanka-vps
        cd ~/sri-lanka-vps
        
        echo "✅ Environment created"
        
    - name: Install and Configure Tmate
      run: |
        echo "========================================="
        echo "🔧 INSTALLING TMATE"
        echo "========================================="
        
        # Update system
        sudo apt-get update -y
        
        # Install dependencies
        sudo apt-get install -y \
          wget \
          curl \
          tar \
          xz-utils \
          tmux \
          build-essential \
          libevent-dev \
          libncurses-dev \
          libmsgpack-dev \
          libssh-dev
        
        # Download and install tmate
        echo "📥 Downloading tmate..."
        wget -q --show-progress https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz
        
        echo "📦 Extracting tmate..."
        tar -xf tmate-2.4.0-static-linux-amd64.tar.xz
        
        echo "🚀 Installing tmate..."
        sudo mv tmate-2.4.0-static-linux-amd64/tmate /usr/local/bin/
        sudo chmod +x /usr/local/bin/tmate
        
        # Cleanup
        rm -rf tmate-2.4.0-static-linux-amd64*
        
        # Verify installation
        echo "✅ Verifying installation..."
        TMATE_VERSION=$(tmate -V 2>&1)
        echo "   Tmate Version: $TMATE_VERSION"
        
        # Check if tmate is working
        if command -v tmate &> /dev/null; then
          echo "✅ Tmate installed successfully at $(which tmate)"
        else
          echo "❌ Tmate installation failed"
          exit 1
        fi
        
        echo "========================================="
        echo "✅ TMATE INSTALLATION COMPLETE"
        echo "========================================="
        
    - name: Configure Sri Lanka Settings
      run: |
        echo "========================================="
        echo "🇱🇰 CONFIGURING SRI LANKA SETTINGS"
        echo "========================================="
        
        # Set timezone to Sri Lanka
        sudo timedatectl set-timezone Asia/Colombo
        echo "✅ Timezone: $(timedatectl | grep 'Time zone')"
        
        # Set locale for Sri Lanka
        sudo locale-gen si_LK.UTF-8 2>/dev/null || true
        echo "✅ Sinhala locale configured"
        
        # Create Sri Lanka welcome message
        cat > ~/sri_lanka_info.txt << 'EOL'
=========================================
🇱🇰 SRI LANKA VPS - WELCOME
=========================================
Location: Near Sri Lanka (Mumbai/Singapore)
Latency to Colombo: 40-50ms
Timezone: Asia/Colombo
Language Support: Sinhala enabled
=========================================
EOL
        
        cat ~/sri_lanka_info.txt
        
    - name: Start Tmate Session with Detailed Output
      id: tmate
      run: |
        echo "========================================="
        echo "🚀 STARTING TMATE SESSION"
        echo "========================================="
        
        # Kill any existing sessions
        echo "🧹 Cleaning up old sessions..."
        tmux kill-server 2>/dev/null || true
        rm -f /tmp/tmate.sock 2>/dev/null || true
        rm -f /tmp/tmate.*.sock 2>/dev/null || true
        
        # Create tmate config
        cat > ~/.tmate.conf << 'CONF'
set -g tmate-api-key "none"
set -g tmate-webhook-url "none"
set -g tmate-identity ""
CONF
        
        # Start tmate in verbose mode
        echo "🔌 Starting tmate daemon..."
        tmate -S /tmp/tmate.sock -v new-session -d
        
        # Wait for session to initialize with progress indicator
        echo "⏳ Waiting for tmate session to initialize (this may take 10-20 seconds)..."
        
        # Wait with progress dots
        for i in {1..20}; do
          echo -n "."
          sleep 1
        done
        echo ""
        
        # Check if socket exists
        if [ -S /tmp/tmate.sock ]; then
          echo "✅ Tmate socket created successfully"
        else
          echo "❌ Tmate socket not found, retrying..."
          tmate -S /tmp/tmate.sock new-session -d
          sleep 10
        fi
        
        # Try multiple times to get connection info
        MAX_RETRIES=5
        for i in $(seq 1 $MAX_RETRIES); do
          echo "📡 Attempt $i to get connection details..."
          
          # Get all available tmate info
          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
          TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null)
          TMATE_RO_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh_ro}' 2>/dev/null)
          TMATE_SESSION_ID=$(tmate -S /tmp/tmate.sock display -p '#{tmate_session_id}' 2>/dev/null)
          TMATE_VERSION=$(tmate -S /tmp/tmate.sock display -p '#{tmate_version}' 2>/dev/null)
          
          # Check if we got any connection info
          if [ -n "$TMATE_SSH" ] || [ -n "$TMATE_WEB" ]; then
            echo "✅ Connection details received!"
            break
          fi
          
          if [ $i -lt $MAX_RETRIES ]; then
            echo "⏳ Waiting 5 more seconds..."
            sleep 5
          fi
        done
        
        # Save all tmate information
        echo "=========================================" > ~/tmate_details.txt
        echo "TMATE SESSION DETAILS - SRI LANKA VPS" >> ~/tmate_details.txt
        echo "=========================================" >> ~/tmate_details.txt
        echo "Generated: $(date)" >> ~/tmate_details.txt
        echo "" >> ~/tmate_details.txt
        echo "🔗 CONNECTION LINKS:" >> ~/tmate_details.txt
        echo "SSH (Read-Write): $TMATE_SSH" >> ~/tmate_details.txt
        echo "SSH (Read-Only): $TMATE_RO_SSH" >> ~/tmate_details.txt
        echo "Web Terminal: $TMATE_WEB" >> ~/tmate_details.txt
        echo "" >> ~/tmate_details.txt
        echo "📊 SESSION INFO:" >> ~/tmate_details.txt
        echo "Session ID: $TMATE_SESSION_ID" >> ~/tmate_details.txt
        echo "Tmate Version: $TMATE_VERSION" >> ~/tmate_details.txt
        echo "" >> ~/tmate_details.txt
        echo "💻 SYSTEM INFO:" >> ~/tmate_details.txt
        echo "Hostname: $(hostname)" >> ~/tmate_details.txt
        echo "IP: $(curl -s ifconfig.me 2>/dev/null || echo 'Unknown')" >> ~/tmate_details.txt
        echo "OS: $(lsb_release -d 2>/dev/null | cut -f2 || cat /etc/os-release 2>/dev/null | grep PRETTY_NAME | cut -d'"' -f2)" >> ~/tmate_details.txt
        echo "Timezone: Asia/Colombo" >> ~/tmate_details.txt
        echo "=========================================" >> ~/tmate_details.txt
        
        # Display detailed information
        echo ""
        echo "⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐"
        echo "           SRI LANKA VPS - TMATE SESSION"
        echo "⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐"
        echo ""
        echo "📍 LOCATION: Near Sri Lanka (40-50ms latency)"
        echo "🕐 TIME: $(TZ=Asia/Colombo date)"
        echo ""
        echo "🔗 CONNECTION METHODS:"
        echo ""
        if [ -n "$TMATE_SSH" ]; then
          echo "   📱 SSH (Read-Write):"
          echo "   $TMATE_SSH"
          echo ""
        else
          echo "   ⚠️ SSH connection not yet available"
          echo ""
        fi
        
        if [ -n "$TMATE_WEB" ]; then
          echo "   🌐 Web Terminal (Read-Write):"
          echo "   $TMATE_WEB"
          echo ""
        else
          echo "   ⚠️ Web terminal not yet available"
          echo ""
        fi
        
        if [ -n "$TMATE_RO_SSH" ]; then
          echo "   👁️ SSH (Read-Only):"
          echo "   $TMATE_RO_SSH"
          echo ""
        fi
        
        echo "📋 INSTRUCTIONS:"
        echo "   1. Copy the SSH or Web link above"
        echo "   2. Paste in your browser (for web) or terminal (for SSH)"
        echo "   3. You'll get full shell access to this server"
        echo ""
        echo "💡 TIPS:"
        echo "   • Web terminal works in any browser"
        echo "   • SSH connections are encrypted"
        echo "   • Session stays alive until you close it"
        echo ""
        echo "📁 Session details saved to: ~/tmate_details.txt"
        echo ""
        echo "⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐"
        
        # Set output for other steps
        echo "tmate_ssh=$TMATE_SSH" >> $GITHUB_OUTPUT
        echo "tmate_web=$TMATE_WEB" >> $GITHUB_OUTPUT
        echo "tmate_ro=$TMATE_RO_SSH" >> $GITHUB_OUTPUT
        
    - name: Display Tmate Session Info
      run: |
        echo "========================================="
        echo "📊 COMPLETE TMATE SESSION INFORMATION"
        echo "========================================="
        cat ~/tmate_details.txt
        
    - name: Keep Session Alive
      run: |
        echo "========================================="
        echo "🔄 KEEPING TMATE SESSION ALIVE"
        echo "========================================="
        echo "Tmate session is running. Press Ctrl+C to stop this job."
        echo "The tmate session will continue in the background."
        echo ""
        
        # Display live session status
        COUNTER=0
        while true; do
          COUNTER=$((COUNTER + 1))
          
          # Check if tmate is still running
          if [ -S /tmp/tmate.sock ]; then
            # Get current connection info
            TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
            TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null)
            
            echo "[$(TZ=Asia/Colombo date)] ✅ Session active - Uptime: ${COUNTER}m | SSH: ${TMATE_SSH:-Waiting...}"
          else
            echo "[$(TZ=Asia/Colombo date)] ⚠️ Tmate socket not found - restarting..."
            tmate -S /tmp/tmate.sock new-session -d
          fi
          
          sleep 60
        done