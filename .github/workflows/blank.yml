name: SLT Sri Lanka VPS Setup

on:
  workflow_dispatch:

jobs:
  setup-slt-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Connect to Your SLT VPS and Install Tmate
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 112.134.175.24
        username: runner
        password: 12345678
        port: 22
        script: |
          echo "========================================="
          echo "🇱🇰 CONNECTED TO SLT SRI LANKA VPS"
          echo "========================================="
          echo "IP Address: 112.134.175.24"
          echo "Username: runner"
          echo "Location: Sri Lanka (SLT Fiber)"
          echo "Time: $(date)"
          echo "========================================="
          
          # Update system
          echo "📦 Updating packages..."
          sudo apt-get update -y
          
          # Install tmate
          echo "🔧 Installing tmate..."
          sudo apt-get install -y software-properties-common
          sudo apt-get update
          sudo apt-get install -y tmate
          
          # Verify installation
          echo "✅ Tmate version: $(tmate -V)"
          
          # Set Sri Lanka timezone
          echo "🕐 Setting timezone..."
          sudo timedatectl set-timezone Asia/Colombo
          
          # Create tmate session
          echo "🚀 Starting tmate session..."
          
          # Kill any existing sessions
          tmux kill-server 2>/dev/null || true
          rm -f /tmp/tmate.sock 2>/dev/null || true
          
          # Start new tmate session
          tmate -S /tmp/tmate.sock new-session -d
          
          echo "⏳ Waiting for tmate session (10 seconds)..."
          sleep 10
          
          # Get connection strings
          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
          TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null)
          TMATE_RO=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh_ro}' 2>/dev/null)
          
          echo "========================================="
          echo "✅ TMATE SESSION READY"
          echo "========================================="
          echo ""
          echo "📍 SERVER: SLT Sri Lanka VPS"
          echo "📌 IP: 112.134.175.24"
          echo ""
          echo "🔗 CONNECTION DETAILS:"
          echo "   SSH (Read-Write): $TMATE_SSH"
          echo "   SSH (Read-Only):  $TMATE_RO"
          echo "   Web Terminal:     $TMATE_WEB"
          echo ""
          echo "📋 HOW TO CONNECT:"
          echo "   1. Copy the SSH line above"
          echo "   2. Paste in your terminal"
          echo "   3. You'll get shell access"
          echo ""
          echo "========================================="
          
          # Keep session info
          echo "$TMATE_SSH" > ~/tmate_ssh.txt
          echo "$TMATE_WEB" > ~/tmate_web.txt
          
          # Show server info every minute
          while true; do
            echo "[$(date)] SLT VPS running - IP: 112.134.175.24"
            sleep 60
          done