name: SLT Sri Lanka VPS Setup

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup-slt-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install sshpass
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass
        
    - name: Connect to SLT VPS and Setup Tmate
      run: |
        echo "========================================="
        echo "🇱🇰 CONNECTING TO SLT SRI LANKA VPS"
        echo "========================================="
        echo "IP Address: 112.134.175.24"
        echo "Username: runner"
        echo "Password: 12345678"
        echo "Location: Sri Lanka (SLT Fiber)"
        echo "========================================="
        
        # Use sshpass to connect and run commands
        sshpass -p "12345678" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null runner@112.134.175.24 "bash -s" << 'ENDSSH'
          echo "✅ Connected to SLT VPS"
          echo "Hostname: $(hostname)"
          echo "IP: $(hostname -I)"
          echo "Time: $(date)"
          
          # Update system
          echo "📦 Updating packages..."
          sudo apt-get update -y
          
          # Install tmate
          echo "🔧 Installing tmate..."
          sudo apt-get install -y wget software-properties-common apt-transport-https
          
          # Method 1: Try apt install
          sudo apt-get install -y tmate || {
            echo "Apt install failed, trying direct download..."
            # Method 2: Direct download
            wget -q https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz
            tar -xf tmate-2.4.0-static-linux-amd64.tar.xz
            sudo mv tmate-2.4.0-static-linux-amd64/tmate /usr/local/bin/
            rm -rf tmate-2.4.0-static-linux-amd64*
          }
          
          # Verify installation
          if command -v tmate &> /dev/null; then
            echo "✅ Tmate installed successfully"
          else
            echo "❌ Tmate installation failed"
            exit 1
          fi
          
          # Set Sri Lanka timezone
          echo "🕐 Setting Sri Lanka timezone..."
          sudo timedatectl set-timezone Asia/Colombo 2>/dev/null || sudo ln -sf /usr/share/zoneinfo/Asia/Colombo /etc/localtime
          
          # Kill any existing tmate sessions
          tmux kill-server 2>/dev/null || true
          rm -f /tmp/tmate.sock 2>/dev/null || true
          
          # Start tmate session
          echo "🚀 Starting tmate session..."
          tmate -S /tmp/tmate.sock new-session -d
          
          # Wait for session to initialize
          echo "⏳ Waiting for tmate session (15 seconds)..."
          sleep 15
          
          # Get connection strings
          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
          TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null)
          TMATE_RO=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh_ro}' 2>/dev/null)
          
          # Get public IP
          PUBLIC_IP=$(curl -s ifconfig.me 2>/dev/null || echo "112.134.175.24")
          
          # Save to file
          cat > ~/tmate_info.txt << EOF
=================================
SLT SRI LANKA VPS CONNECTION INFO
=================================
Date: $(date)
Local IP: 112.134.175.24
Public IP: $PUBLIC_IP

TMATE CONNECTIONS:
SSH (RW): $TMATE_SSH
SSH (RO): $TMATE_RO
Web: $TMATE_WEB

DIRECT SSH:
ssh runner@112.134.175.24
Password: 12345678
=================================
EOF
          
          # Display information
          echo ""
          echo "========================================="
          echo "✅ TMATE SESSION READY"
          echo "========================================="
          echo ""
          echo "📍 SERVER: SLT Sri Lanka VPS"
          echo "📌 Local IP: 112.134.175.24"
          echo "🌍 Public IP: $PUBLIC_IP"
          echo "🕐 Time: $(date)"
          echo ""
          echo "🔗 TMATE CONNECTIONS:"
          echo "   SSH (Read-Write): $TMATE_SSH"
          echo "   SSH (Read-Only):  $TMATE_RO"
          echo "   Web Terminal:     $TMATE_WEB"
          echo ""
          echo "🔑 DIRECT SSH ACCESS:"
          echo "   Command: ssh runner@112.134.175.24"
          echo "   Password: 12345678"
          echo ""
          echo "📁 Info saved to: ~/tmate_info.txt"
          echo "========================================="
          
          # Keep session alive
          echo ""
          echo "🔄 Tmate session is running..."
          echo "Press Ctrl+C to disconnect (session continues on server)"
          echo ""
          
          # Monitor loop
          COUNTER=0
          while true; do
            COUNTER=$((COUNTER + 1))
            echo "[$(date)] ✅ SLT VPS active - Session running for ${COUNTER} minutes"
            sleep 60
          done
ENDSSH