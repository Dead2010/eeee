name: Check SLT Connection

on: workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Test connection
        run: |
          echo "Testing connection to 112.134.175.24..."
          ping -c 4 112.134.175.24 || echo "Ping failed"
          nc -zv 112.134.175.24 22 || echo "Port 22 is closed"
          curl -v telnet://112.134.175.24:22 || echo "Telnet failed"