name: Sri Lanka VPS with Tmate

on:
  workflow_dispatch:

jobs:
  setup-tmate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Tmate
      run: |
        echo "========================================="
        echo "INSTALLING TMATE"
        echo "========================================="
        
        # Update system
        sudo apt-get update -y
        
        # Install dependencies
        sudo apt-get install -y wget curl tar tmux
        
        # Download and install tmate
        wget -q https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz
        tar -xf tmate-2.4.0-static-linux-amd64.tar.xz
        sudo mv tmate-2.4.0-static-linux-amd64/tmate /usr/local/bin/
        sudo chmod +x /usr/local/bin/tmate
        rm -rf tmate-2.4.0-static-linux-amd64*
        
        echo "✅ Tmate installed: $(tmate -V)"
        
    - name: Set Sri Lanka Timezone
      run: |
        sudo timedatectl set-timezone Asia/Colombo
        echo "✅ Timezone set to: $(timedatectl | grep 'Time zone' | awk '{print $3}')"
        
    - name: Start Tmate Session
      id: tmate
      run: |
        echo "========================================="
        echo "STARTING TMATE SESSION"
        echo "========================================="
        
        # Kill any existing sessions
        tmux kill-server 2>/dev/null || true
        rm -f /tmp/tmate.sock 2>/dev/null || true
        
        # Start tmate
        tmate -S /tmp/tmate.sock new-session -d
        
        echo "Waiting for tmate to initialize..."
        sleep 10
        
        # Get connection strings with error handling
        TMATE_SSH=""
        TMATE_WEB=""
        
        # Try multiple times to get connection info
        for i in {1..10}; do
          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
          TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null)
          
          if [ -n "$TMATE_SSH" ] || [ -n "$TMATE_WEB" ]; then
            break
          fi
          
          echo "Attempt $i: Waiting for connection..."
          sleep 2
        done
        
        echo "========================================="
        echo "TMATE SESSION READY"
        echo "========================================="
        echo ""
        echo "SERVER LOCATION: Near Sri Lanka (40-50ms latency)"
        echo "SERVER TIME: $(TZ=Asia/Colombo date)"
        echo ""
        
        if [ -n "$TMATE_SSH" ]; then
          echo "SSH CONNECTION:"
          echo "$TMATE_SSH"
          echo ""
        fi
        
        if [ -n "$TMATE_WEB" ]; then
          echo "WEB TERMINAL:"
          echo "$TMATE_WEB"
          echo ""
        fi
        
        if [ -z "$TMATE_SSH" ] && [ -z "$TMATE_WEB" ]; then
          echo "⚠️ Tmate is still initializing. Check back in 30 seconds."
          echo "The session will be available soon."
        fi
        
        echo "========================================="
        echo ""
        echo "HOW TO CONNECT:"
        echo "1. Copy the SSH line above"
        echo "2. Paste in your terminal"
        echo "3. You now have a shell near Sri Lanka"
        echo ""
        echo "Session will stay alive for 6 hours"
        echo "========================================="
        
        # Save to file for reference
        echo "Tmate SSH: $TMATE_SSH" > tmate_info.txt
        echo "Tmate Web: $TMATE_WEB" >> tmate_info.txt
        
    - name: Keep Session Alive
      run: |
        echo "========================================="
        echo "KEEPING TMATE SESSION ACTIVE"
        echo "========================================="
        echo "Session is running. This job will stay alive for 6 hours."
        echo "Check the previous step for connection details."
        echo ""
        
        # Keep session alive for 6 hours
        for i in {1..360}; do
          if [ -S /tmp/tmate.sock ]; then
            echo "[$(TZ=Asia/Colombo date)] ✅ Session active - Minute $i of 360"
          else
            echo "[$(TZ=Asia/Colombo date)] ⚠️ Session issue - restarting"
            tmate -S /tmp/tmate.sock new-session -d
          fi
          sleep 60
        done