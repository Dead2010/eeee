name: 🚀 RDP ULTRA FAST

on: workflow_dispatch

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350
    
    steps:
    - name: 🚀 Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: 🔑 Set Password
      run: |
        $p = ConvertTo-SecureString "Admin@123456" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $p
        
    - name: 📥 Get bore
      run: |
        curl -L -o bore.exe https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.exe
        
    - name: 🌐 Start Tunnel
      id: bore
      run: |
        Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -RedirectStandardOutput "bore.txt"
        Start-Sleep -Seconds 8
        $port = (Select-String -Path "bore.txt" -Pattern "\d{4,5}" | Select-Object -First 1).Matches.Value
        echo "PORT=$port" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
    - name: 📋 CONNECTION INFO
      run: |
        echo "═══════════════════════════════"
        echo "   🔥 RDP IS READY! 🔥"
        echo "═══════════════════════════════"
        echo ""
        echo "📡 bore.pub:$env:PORT"
        echo "👤 Username: runneradmin"
        echo "🔑 Password: Admin@123456"
        echo ""
        echo "💻 Connect now:"
        echo "Windows: mstsc /v:bore.pub:$env:PORT"
        echo "Linux: xfreerdp /v:bore.pub:$env:PORT /u:runneradmin"
        echo "Android/iOS: bore.pub:$env:PORT"
        echo ""
        echo "⏱️ Active for 6 hours"
        echo "═══════════════════════════════"
        
    - name: ⏳ Keep Alive
      run: |
        $end = (Get-Date).AddHours(5.5)
        while ((Get-Date) -lt $end) {
          $left = [math]::Round(($end - (Get-Date)).TotalMinutes, 0)
          Write-Host "⏱️ $left min left - bore.pub:$env:PORT" -ForegroundColor Yellow
          Start-Sleep -Seconds 120
        }
