name: Access Sri Lanka Device

on: workflow_dispatch

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Install ngrok
        run: |
          # On your Sri Lanka PC, run this manually first:
          # 1. Download ngrok from https://ngrok.com/download
          # 2. Run: ngrok tcp 22
          # 3. Copy the ngrok URL (e.g., 0.tcp.ngrok.io:12345)
          
          echo "Then use this workflow to connect:"
          echo "ssh -p 12345 user@0.tcp.ngrok.io"